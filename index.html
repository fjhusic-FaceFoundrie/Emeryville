  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">' + (ICONS[name] || '') + '</svg>';
}

/* ---------------------------------------------------------------- */
/* Helpers                                                           */
/* ---------------------------------------------------------------- */

function normalizeHeader(h) {
  return String(h || "").trim().toLowerCase().replace(/[_\-]/g, " ").replace(/\s+/g, " ");
}

function autoMapColumns(headers) {
  const map = {};
  const normalized = headers.map(normalizeHeader);
  Object.entries(FIELD_ALIASES).forEach(([field, aliases]) => {
    const idx = normalized.findIndex((h) => aliases.includes(h));
    if (idx !== -1) map[field] = headers[idx];
  });
  return map;
}

function parseNumber(val) {
  if (typeof val === "number") return val;
  if (val == null) return 0;
  const cleaned = String(val).replace(/[$,\s]/g, "");
  const n = parseFloat(cleaned);
  return isNaN(n) ? 0 : n;
}

function formatValue(val, format) {
  if (format === "currency") return "$" + Math.round(val).toLocaleString();
  return Math.round(val).toLocaleString();
}

function daysInMonth(year, monthIndex) {
  return new Date(year, monthIndex + 1, 0).getDate();
}

function getStatusLabel(progressPct, expectedPct) {
  if (progressPct >= 100) return "Goal Hit";
  const diff = progressPct - expectedPct;
  if (diff >= 15) return "Ahead of Goal";
  if (diff >= -10) return "On Track";
  if (diff >= -25) return "Almost There";
  return "Behind Pace";
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function parseCSV(text) {
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; } else { inQuotes = false; }
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ",") { row.push(field); field = ""; }
      else if (c === "\r") { /* skip */ }
      else if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; }
      else field += c;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter((r) => !(r.length === 1 && r[0].trim() === ""));
}

function parseFile(file) {
  return new Promise((resolve, reject) => {
    const ext = file.name.split(".").pop().toLowerCase();
    if (ext !== "csv") {
      reject(new Error("Only .csv files are supported here. In Excel or Sheets, use File > Save As / Download > CSV, then re-upload."));
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const rows = parseCSV(String(reader.result));
        if (!rows.length) { resolve({ headers: [], rows: [] }); return; }
        const headers = rows[0];
        const dataRows = rows.slice(1).map((r) => {
          const obj = {};
          headers.forEach((h, idx) => { obj[h] = r[idx] !== undefined ? r[idx] : ""; });
          return obj;
        });
        resolve({ headers, rows: dataRows });
      } catch (err) { reject(err); }
    };
    reader.onerror = () => reject(new Error("Could not read the file."));
    reader.readAsText(file);
  });
}

const state = {
  roster: JSON.parse(JSON.stringify(SAMPLE_ROSTER)),
  goals: { ...DEFAULT_GOALS },
  frontBarRoster: JSON.parse(JSON.stringify(SAMPLE_FRONTBAR_ROSTER)),
  frontBarGoals: { ...DEFAULT_FRONTBAR_GOALS },
  salesData: { ...JSON.parse(JSON.stringify(SAMPLE_SALES)), ...JSON.parse(JSON.stringify(SAMPLE_FRONTBAR_SALES)) },
  dailyRetailLog: {},
  adminOpen: false,
  banner: null,
  pending: null,
  dragOver: false,
  _lastResetApplied: "0000-00-00",
};

function loadPersisted() {
  try {
    const s = localStorage.getItem("ff-settings-emeryville");
    if (s) {
      const parsed = JSON.parse(s);
      if (parsed.goals) state.goals = parsed.goals;
      if (parsed.roster) state.roster = parsed.roster;
      if (parsed.frontBarGoals) state.frontBarGoals = parsed.frontBarGoals;
      if (parsed.frontBarRoster) state.frontBarRoster = parsed.frontBarRoster;
      if (parsed._lastResetApplied) state._lastResetApplied = parsed._lastResetApplied;
      if (parsed.dailyRetailLog) state.dailyRetailLog = parsed.dailyRetailLog;
    }
  } catch (e) { /* keep defaults */ }
  try {
    const d = localStorage.getItem("ff-sales-data-emeryville");
    if (d) {
      const parsed = JSON.parse(d);
      // Wrapped shape is { asOf, data }. Older/legacy saves were the raw
      // sales object with no asOf - treat those as very old so any real
      // scheduled snapshot supersedes them.
      if (parsed && typeof parsed === "object" && "data" in parsed) {
        state.salesData = parsed.data || {};
        state._salesAsOf = parsed.asOf || "0000-00-00";
      } else {
        state.salesData = parsed;
        state._salesAsOf = "0000-00-00";
      }
    }
  } catch (e) { /* keep defaults */ }
}

function saveSettings() {
  try {
    localStorage.setItem("ff-settings-emeryville", JSON.stringify({
      goals: state.goals,
      roster: state.roster,
      frontBarGoals: state.frontBarGoals,
      frontBarRoster: state.frontBarRoster,
      _lastResetApplied: state._lastResetApplied,
      dailyRetailLog: state.dailyRetailLog,
    }));
  } catch (e) { console.error("Could not save settings", e); }
}
function saveSalesData() {
  try {
    localStorage.setItem("ff-sales-data-emeryville", JSON.stringify({
      asOf: state._salesAsOf || new Date().toISOString().slice(0, 10),
      data: state.salesData,
    }));
  } catch (e) { console.error("Could not save sales data", e); }
}

/* ---------------------------------------------------------------- */
/* Daily snapshot (scheduled auto-refresh)                           */
/* ---------------------------------------------------------------- */

// Merges DAILY_SNAPSHOT.sales into state the same way a manual CSV upload
// would (auto-adding any new employees to the roster as Part-Time), but
// only if the snapshot is actually newer than whatever's already loaded -
// a same-day-or-later manual upload always wins over the morning's
// automatic pull so nobody's manual correction gets silently clobbered.
function applyDailySnapshotIfNewer() {
  if (!DAILY_SNAPSHOT || !DAILY_SNAPSHOT.asOf) return; // no scheduled run has populated this yet
  const cachedAsOf = state._salesAsOf || "0000-00-00";
  if (DAILY_SNAPSHOT.asOf <= cachedAsOf) return;

  const nextSales = { ...state.salesData };
  const nextRoster = [...state.roster];
  // Check names against BOTH teams so a Front Bar person already tracked
  // over there never gets duplicated into the main roster too.
  const rosterNames = new Set(
    [...state.roster, ...state.frontBarRoster].map((r) => r.name.trim().toLowerCase())
  );
  let updatedCount = 0, addedCount = 0;

  Object.entries(DAILY_SNAPSHOT.sales).forEach(([rawName, rec]) => {
    const name = String(rawName || "").trim();
    if (!name) return;
    nextSales[name] = {
      service: Number(rec && rec.service) || 0,
      retail: Number(rec && rec.retail) || 0,
      membership: Number(rec && rec.membership) || 0,
    };
    updatedCount += 1;
    if (!rosterNames.has(name.toLowerCase())) {
      nextRoster.push({ id: "auto-" + Date.now() + "-" + Math.random().toString(36).slice(2, 7), name, type: "PT" });
      rosterNames.add(name.toLowerCase());
      addedCount += 1;
    }
  });

  state.salesData = nextSales;
  state.roster = nextRoster;
  state._salesAsOf = DAILY_SNAPSHOT.asOf;
  state.banner = {
    type: "success",
    text: "Updated automatically with Boulevard data through " + DAILY_SNAPSHOT.asOf + " (" +
      updatedCount + " esthetician" + (updatedCount === 1 ? "" : "s") +
      (addedCount > 0 ? ", " + addedCount + " new" : "") + ").",
  };
  saveSettings();
  saveSalesData();
}

// Merges the injected DAILY_RETAIL_LOG dict into state.dailyRetailLog. The
// injector script always sends the FULL accumulated history for the
// current month (it reads whatever was already in the deployed HTML and
// adds one new day each run), so this is a safe union merge - injected
// values win for any date they contain, nothing already in state is ever
// silently dropped.
function applyDailyRetailLogIfNewer() {
  if (!DAILY_RETAIL_LOG || typeof DAILY_RETAIL_LOG !== "object") return;
  const keys = Object.keys(DAILY_RETAIL_LOG);
  if (!keys.length) return;
  state.dailyRetailLog = { ...state.dailyRetailLog, ...DAILY_RETAIL_LOG };
  saveSettings();
}

/* ---------------------------------------------------------------- */
/* Month reset (Emeryville Dashboard Month Reset skill)              */
/* ---------------------------------------------------------------- */

// Applies an injected MONTH_RESET payload once, the first time it's newer
// than whatever reset (if any) was already applied in this browser. Wipes
// ALL sales figures and REPLACES both rosters wholesale (not a merge, unlike
// the daily snapshot) - this is meant to start a brand-new month from
// scratch. Monthly Goals for both teams are deliberately left untouched so
// they roll over month to month.
function applyMonthResetIfNewer() {
  if (!MONTH_RESET || !MONTH_RESET.asOf) return; // no reset has been run yet
  const lastApplied = state._lastResetApplied || "0000-00-00";
  if (MONTH_RESET.asOf <= lastApplied) return;

  const toRosterEntry = (prefix) => (r, idx) => ({
    id: prefix + "-" + Date.now() + "-" + idx,
    name: String((r && r.name) || "").trim(),
    type: (r && r.type) === "FT" ? "FT" : "PT",
  });

  state.roster = (MONTH_RESET.mainRoster || []).map(toRosterEntry("reset-main"));
  state.frontBarRoster = (MONTH_RESET.frontBarRoster || []).map(toRosterEntry("reset-fb"));
  state.salesData = {}; // fresh month - zero every sales figure
  state.dailyRetailLog = {}; // fresh month - clear the daily $500 push calendar too
  state._salesAsOf = MONTH_RESET.asOf;
  state._lastResetApplied = MONTH_RESET.asOf;
  state.banner = {
    type: "success",
    text: "Started a new month (" + MONTH_RESET.asOf + "): reset to " +
      state.roster.length + " Esthetician/Manager" + (state.roster.length === 1 ? "" : "s") +
      " and " + state.frontBarRoster.length + " Front Bar team member" + (state.frontBarRoster.length === 1 ? "" : "s") +
      ". Monthly Goals were left as-is.",
  };
  saveSettings();
  saveSalesData();
}

/* ---------------------------------------------------------------- */
/* Derived data                                                      */
/* ---------------------------------------------------------------- */

// mode "weighted" (default, main team): individual goal = (team goal ÷
// total weight) × this person's weight (FT counts double).
// mode "flat" (Front Bar): individual goal = the same fixed per-person
// number for everyone, FT or PT alike - no weighting/pooling at all.
function computeEmployees(roster, goals, expectedPct, categories, mode) {
  categories = categories || CATEGORY_META;
  mode = mode || "weighted";
  const totalWeight = roster.reduce((sum, e) => sum + (WEIGHTS[e.type] || 1), 0);
  return roster.map((emp) => {
    const weight = WEIGHTS[emp.type] || 1;
    const record = state.salesData[emp.name] || { service: 0, retail: 0, membership: 0 };
    const cats = {};
    Object.keys(categories).forEach((cat) => {
      const individualGoal = mode === "flat"
        ? (goals[cat] || 0)
        : (totalWeight > 0 ? (goals[cat] / totalWeight) * weight : 0);
      const current = record[cat] || 0;
      const pct = individualGoal > 0 ? (current / individualGoal) * 100 : 0;
      const status = getStatusLabel(pct, expectedPct);
      const delta = current - individualGoal;
      cats[cat] = { current, goal: individualGoal, pct, status, delta };
    });
    return { ...emp, weight, categories: cats };
  });
}

// mode "flat" team goal = per-person target × headcount (so the team KPI
// card scales automatically as Front Bar people are added/removed).
function computeTotals(employees, goals, expectedPct, categories, mode) {
  categories = categories || CATEGORY_META;
  mode = mode || "weighted";
  const t = {};
  Object.keys(categories).forEach((cat) => {
    const current = employees.reduce((sum, e) => sum + e.categories[cat].current, 0);
    const goal = mode === "flat" ? (goals[cat] || 0) * employees.length : goals[cat];
    const pct = goal > 0 ? (current / goal) * 100 : 0;
    const status = getStatusLabel(pct, expectedPct);
    t[cat] = { current, goal, pct, status };
  });
  return t;
}

function computeTopPerformers(employees) {
  const t = {};
  Object.keys(CATEGORY_META).forEach((cat) => {
    let best = null;
    employees.forEach((e) => {
      const val = e.categories[cat].current;
      if (val > 0 && (!best || val > best.value)) best = { name: e.name, value: val };
    });
    t[cat] = best;
  });
  return t;
}

function applyRows(rows, mapping) {
  const nameKey = mapping.name;
  if (!nameKey) {
    state.banner = { type: "error", text: "No name column was mapped. Please try again." };
    render();
    return;
  }
  const nextSales = { ...state.salesData };
  const nextRoster = [...state.roster];
  // Check names against BOTH teams so a Front Bar person already tracked
  // over there never gets duplicated into the main roster too.
  const rosterNames = new Set(
    [...state.roster, ...state.frontBarRoster].map((r) => r.name.trim().toLowerCase())
  );
  let updatedCount = 0, addedCount = 0, skippedCount = 0;

  rows.forEach((row) => {
    const rawName = row[nameKey];
    const name = String(rawName || "").trim();
    if (!name) { skippedCount += 1; return; }
    const existing = nextSales[name] || { service: 0, retail: 0, membership: 0 };
    const updated = { ...existing };
    ["service", "retail", "membership"].forEach((cat) => {
      if (mapping[cat]) updated[cat] = parseNumber(row[mapping[cat]]);
    });
    nextSales[name] = updated;
    updatedCount += 1;

    if (!rosterNames.has(name.toLowerCase())) {
      nextRoster.push({ id: "auto-" + Date.now() + "-" + Math.random().toString(36).slice(2, 7), name, type: "PT" });
      rosterNames.add(name.toLowerCase());
      addedCount += 1;
    }
  });

  state.salesData = nextSales;
  state.roster = nextRoster;
  state._salesAsOf = new Date().toISOString().slice(0, 10);

  let text = "Updated " + updatedCount + " esthetician" + (updatedCount === 1 ? "" : "s") + ".";
  if (addedCount > 0) text += " Added " + addedCount + " new team member" + (addedCount === 1 ? "" : "s") + " (set to Part-Time by default — adjust in Settings).";
  if (skippedCount > 0) text += " Skipped " + skippedCount + " row" + (skippedCount === 1 ? "" : "s") + " with no name.";
  state.banner = { type: "success", text };
  state.pending = null;
  saveSettings();
  saveSalesData();
  render();
}

async function handleFile(file) {
  state.banner = null;
  try {
    const { headers, rows } = await parseFile(file);
    if (!headers.length || !rows.length) {
      state.banner = { type: "error", text: "That file looks empty. Please check it has a header row and at least one data row." };
      render();
      return;
    }
    const mapping = autoMapColumns(headers);
    const hasMetric = mapping.service || mapping.retail || mapping.membership;
    if (mapping.name && hasMetric) {
      applyRows(rows, mapping);
    } else {
      state.pending = { fileName: file.name, headers, rows, mapping };
      render();
    }
  } catch (err) {
    state.banner = { type: "error", text: "Could not read that file: " + (err.message || "unknown error") };
    render();
  }
}

function updateGoal(team, cat, value) {
  const key = team === "frontbar" ? "frontBarGoals" : "goals";
  state[key] = { ...state[key], [cat]: Math.max(0, parseNumber(value)) };
  saveSettings();
  render();
}
function updateEmployee(team, id, field, value) {
  const key = team === "frontbar" ? "frontBarRoster" : "roster";
  state[key] = state[key].map((e) => (e.id === id ? { ...e, [field]: value } : e));
  saveSettings();
  render();
}
function removeEmployee(team, id) {
  const key = team === "frontbar" ? "frontBarRoster" : "roster";
  state[key] = state[key].filter((e) => e.id !== id);
  saveSettings();
  render();
}
function addEmployee(team) {
  const key = team === "frontbar" ? "frontBarRoster" : "roster";
  state[key] = [...state[key], { id: "manual-" + Date.now(), name: "New Team Member", type: "PT" }];
  saveSettings();
  render();
}
function loadSampleData() {
  state.roster = JSON.parse(JSON.stringify(SAMPLE_ROSTER));
  state.goals = { ...DEFAULT_GOALS };
  state.frontBarRoster = JSON.parse(JSON.stringify(SAMPLE_FRONTBAR_ROSTER));
  state.frontBarGoals = { ...DEFAULT_FRONTBAR_GOALS };
  state.salesData = { ...JSON.parse(JSON.stringify(SAMPLE_SALES)), ...JSON.parse(JSON.stringify(SAMPLE_FRONTBAR_SALES)) };
  state.banner = { type: "success", text: "Sample data restored." };
  saveSettings();
  saveSalesData();
  render();
}
function clearData() {
  const cleared = {};
  [...state.roster, ...state.frontBarRoster].forEach((e) => { cleared[e.name] = { service: 0, retail: 0, membership: 0 }; });
  state.salesData = cleared;
  state.banner = { type: "success", text: "All sales figures cleared. Goals and rosters kept." };
  saveSalesData();
  render();
}

function renderProgressSections(employees, goals, categories, mode) {
  categories = categories || CATEGORY_META;
  mode = mode || "weighted";
  return Object.entries(categories).map(([cat, meta]) => (
    '<div class="ff-section">' +
      '<div class="ff-section-head">' +
        '<h3 class="ff-section-title">' + meta.label + '</h3>' +
        '<span class="ff-section-goal">' + (mode === "flat"
          ? ("Per person: " + formatValue(goals[cat], meta.format) + " · Team total: " + formatValue((goals[cat] || 0) * employees.length, meta.format) + " (" + employees.length + " " + (employees.length === 1 ? "person" : "people") + ")")
          : ("Team goal: " + formatValue(goals[cat], meta.format) + " · Weighted by FT (2x) / PT (1x)")
        ) + '</span>' +
      '</div>' +
      employees.map((e) => {
        const c = e.categories[cat];
        const style = STATUS_STYLE[c.status];
        return (
          '<div class="ff-progress-row">' +
            '<div class="ff-progress-name">' + escapeHtml(e.name) + ' <span class="ff-roster-type">' + e.type + '</span></div>' +
            '<div class="ff-progress-detail">' +
              '<div class="ff-petal-track"><div class="ff-petal-fill" style="width:' + Math.min(100, c.pct) + '%; background:' + (c.pct >= 100 ? "var(--gold)" : "var(--sage)") + ';"></div></div>' +
              '<span class="ff-progress-pct">' + Math.round(c.pct) + '%</span>' +
            '</div>' +
            '<div style="display:flex; align-items:center; gap:10px; justify-self:end;">' +
              '<div class="ff-progress-numbers">' + formatValue(c.current, meta.format) + ' of ' + formatValue(c.goal, meta.format) + ' · ' + (c.delta >= 0 ? formatValue(c.delta, meta.format) + " ahead" : formatValue(-c.delta, meta.format) + " to go") + '</div>' +
              '<span class="ff-status-pill" style="background:' + style.bg + '; color:' + style.fg + ';">' + c.status + '</span>' +
            '</div>' +
          '</div>'
        );
      }).join("") +
    '</div>'
  )).join("");
}

        '<div style="font-size:12px; color:var(--charcoal-soft); margin-top:10px; display:flex; gap:6px;">' +

            '<div class="ff-toggle">' +

function renderTeamDivider(title, subtitle) {
  return (
    '<div style="margin: 32px 0 18px; padding-top: 14px; border-top: 2px solid var(--stone-dark);">' +
      '<h2 class="ff-serif" style="font-size:24px; font-weight:600; margin:0;">' + escapeHtml(title) + '</h2>' +

// One circle per day of the current month, green if that day's COMBINED
// (Estheticians + Managers + Front Bar, not just Front Bar) retail sales
// hit DAILY_RETAIL_TARGET, red if the day has data but missed it, and a
// neutral outline for days with no data yet (future days, or days before
// the daily download has run). Front Bar is responsible for pushing the
// whole team to hit this every day, so it lives under their section.
function renderDailyRetailCalendar(today, dim) {
  const year = today.getFullYear();
  const month = today.getMonth();
  const days = [];
  for (let d = 1; d <= dim; d++) {
    const iso = year + "-" + String(month + 1).padStart(2, "0") + "-" + String(d).padStart(2, "0");
    const hasData = Object.prototype.hasOwnProperty.call(state.dailyRetailLog, iso);
    const value = hasData ? state.dailyRetailLog[iso] : null;
    const hit = hasData && value >= DAILY_RETAIL_TARGET;
    days.push({ d, iso, hasData, value, hit });
  }
  return (
    '<div class="ff-section">' +
      '<div class="ff-section-head">' +
        '<h3 class="ff-section-title">Daily $' + DAILY_RETAIL_TARGET + ' Retail Push</h3>' +
        '<span class="ff-section-goal">Whole store (Estheticians + Managers + Front Bar) combined, per day</span>' +
      '</div>' +
      '<div class="ff-daily-calendar">' +
        days.map((day) => (
          '<div class="ff-daily-dot ' + (day.hasData ? (day.hit ? "hit" : "miss") : "pending") + '" ' +
            'title="' + day.iso + (day.hasData ? (": " + formatValue(day.value, "currency") + " retail") : ": no data yet") + '">' +
            day.d +
          '</div>'
        )).join("") +
      '</div>' +
      '<div style="font-size:12px; color:var(--charcoal-soft); margin-top:12px; display:flex; gap:14px; flex-wrap:wrap;">' +
        '<span><span class="ff-daily-legend-dot hit"></span> $' + DAILY_RETAIL_TARGET + '+ hit</span>' +
        '<span><span class="ff-daily-legend-dot miss"></span> Missed</span>' +
        '<span><span class="ff-daily-legend-dot pending"></span> No data yet</span>' +
      '</div>' +
    '</div>'
  );
}

function render() {
  const today = new Date();
  const monthLabel = today.toLocaleString("default", { month: "long", year: "numeric" });
  const dim = daysInMonth(today.getFullYear(), today.getMonth());
  const expectedPct = Math.min(100, (today.getDate() / dim) * 100);

  const employees = computeEmployees(state.roster, state.goals, expectedPct, CATEGORY_META, "weighted");
  const totals = computeTotals(employees, state.goals, expectedPct, CATEGORY_META, "weighted");
  const topPerformers = computeTopPerformers(employees);

  const fbEmployees = computeEmployees(state.frontBarRoster, state.frontBarGoals, expectedPct, FRONTBAR_CATEGORY_META, "flat");
  const fbTotals = computeTotals(fbEmployees, state.frontBarGoals, expectedPct, FRONTBAR_CATEGORY_META, "flat");

  const html = (
    '<div class="ff-dash">' +
      '<div class="ff-wrap">' +
        renderHeader(today, monthLabel, dim, expectedPct) +
        (state.banner ? renderBanner() : "") +
        renderDropzone() +
        renderTopStrip(topPerformers) +
        renderMainGrid(employees, totals, expectedPct, "Esthetician Snapshot", CATEGORY_META) +
        renderProgressSections(employees, state.goals, CATEGORY_META, "weighted") +
        renderTeamDivider("Front Bar", "Tracked separately from Estheticians/Managers - flat per-person targets, no FT/PT weighting.") +
        renderMainGrid(fbEmployees, fbTotals, expectedPct, "Front Bar Snapshot", FRONTBAR_CATEGORY_META) +
        renderProgressSections(fbEmployees, state.frontBarGoals, FRONTBAR_CATEGORY_META, "flat") +
        renderDailyRetailCalendar(today, dim) +
        '<div class="ff-footer-note">Goals are recalculated automatically whenever the roster, weights, or monthly targets change in Settings.</div>' +
      '</div>' +
      (state.adminOpen ? renderDrawer() : "") +
      (state.pending ? renderMappingModal() : "") +
    '</div>'
  );

  root.innerHTML = html;
}

/* ---------------------------------------------------------------- */
/* Event delegation                                                  */
/* ---------------------------------------------------------------- */

const root = document.getElementById("root");

root.addEventListener("click", (e) => {
  const el = e.target.closest("[data-action]");
  if (!el) return;
  const action = el.dataset.action;
  if (action === "upload-click") {
    const input = document.getElementById("ff-file-input");
    if (input) input.click();
  } else if (action === "open-settings") {
    state.adminOpen = true; render();
  } else if (action === "close-settings") {
    state.adminOpen = false; render();
  } else if (action === "close-banner") {
    state.banner = null; render();
  } else if (action === "remove-employee") {
    removeEmployee(el.dataset.team || "main", el.dataset.empId);
  } else if (action === "add-employee") {
    addEmployee(el.dataset.team || "main");
  } else if (action === "load-sample") {
    loadSampleData();
  } else if (action === "clear-data") {
    clearData();
  } else if (action === "set-emp-type") {
    updateEmployee(el.dataset.team || "main", el.dataset.empId, "type", el.dataset.value);
  } else if (action === "cancel-mapping") {
    state.pending = null; render();
  } else if (action === "apply-mapping") {
    applyRows(state.pending.rows, state.pending.mapping);
  }
});

root.addEventListener("change", (e) => {
  const t = e.target;
  if (t.id === "ff-file-input") {
    const file = t.files && t.files[0];
    if (file) handleFile(file);
    t.value = "";
    return;
  }
  if (t.dataset.goalCat) { updateGoal(t.dataset.team || "main", t.dataset.goalCat, t.value); return; }
  if (t.dataset.empField === "name") { updateEmployee(t.dataset.team || "main", t.dataset.empId, "name", t.value); return; }
  if (t.dataset.mappingField) {
    state.pending = { ...state.pending, mapping: { ...state.pending.mapping, [t.dataset.mappingField]: t.value } };
    render();
    return;
  }
});

root.addEventListener("dragover", (e) => {
  const dz = e.target.closest(".ff-dropzone");
  if (dz) {
    e.preventDefault();
    if (!state.dragOver) { state.dragOver = true; render(); }
  }
});
root.addEventListener("dragleave", (e) => {
  const dz = e.target.closest(".ff-dropzone");
  if (dz && state.dragOver) { state.dragOver = false; render(); }
});
root.addEventListener("drop", (e) => {
  const dz = e.target.closest(".ff-dropzone");
  if (dz) {
    e.preventDefault();
    state.dragOver = false;
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    if (file) handleFile(file); else render();
  }
});

/* ---------------------------------------------------------------- */
/* Init                                                              */
/* ---------------------------------------------------------------- */

loadPersisted();
applyMonthResetIfNewer();
applyDailySnapshotIfNewer();
applyDailyRetailLogIfNewer();
render();
</script>
